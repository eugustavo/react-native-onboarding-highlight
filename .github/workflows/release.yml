name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install Dependencies
        run: npm ci

      - name: Build Package
        run: npm run build

      - name: Run Tests
        run: npm test

      - name: Check for changesets
        id: changesets
        run: |
          changeset_files=$(find .changeset -name "*.md" ! -name "README.md" -type f 2>/dev/null)
          if [ -n "$changeset_files" ]; then
            echo "has_changesets=true" >> $GITHUB_OUTPUT
          else
            echo "has_changesets=false" >> $GITHUB_OUTPUT
          fi

      - name: Get version
        if: steps.changesets.outputs.has_changesets == 'true'
        id: get_version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: steps.changesets.outputs.has_changesets == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          name: v${{ steps.get_version.outputs.version }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        if: steps.changesets.outputs.has_changesets == 'true'
        run: |
          echo "✅ GitHub Release v${{ steps.get_version.outputs.version }} created successfully!"
          echo ""
          echo "Next steps (manual):"
          echo "1. Build the package: npm run build"
          echo "2. Publish to npm: npm publish --access public"
